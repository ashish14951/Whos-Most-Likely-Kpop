        * {

            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bts-purple) 0%, var(--svt-rose) 50%, var(--svt-serenity) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        #app-container {
            width: 95%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            position: relative;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-weight: 300; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
        p { margin-bottom: 30px; opacity: 0.8; }

        .bias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        .bias-item {
            padding: 10px;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            border: 2px solid transparent;
        }

        .bias-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .bias-item.selected { border-color: var(--bts-purple); background: #f0f0f0; font-weight: bold; }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--bts-purple), var(--svt-rose));
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 40px;
            min-height: 4em;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            line-height: 1.4;
        }

        .cards-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
            margin-bottom: 40px;
        }

        .photo-card {
            flex: 1;
            aspect-ratio: 2/3;
            max-width: 240px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 4px solid transparent;
            overflow: hidden;
        }

        .photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .photo-card.selected {
            border-color: white;
            box-shadow: 0 0 30px rgba(255,255,255,0.9);
            transform: scale(1.08);
            z-index: 2;
        }

        .photo-card.dimmed {
            opacity: 0.3;
            filter: grayscale(0.8);
            pointer-events: none;
        }

        .photo-card.holographic::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(105deg, 
                transparent 30%, 
                rgba(255, 255, 255, 0.4) 45%, 
                rgba(255, 255, 255, 0.6) 50%, 
                rgba(255, 255, 255, 0.4) 55%, 
                transparent 70%
            );
            background-size: 200% 200%;
            animation: holo-shimmer 3s infinite linear;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes holo-shimmer {
            0% { background-position: 200% 0%; }
            100% { background-position: -200% 0%; }
        }

        .bias-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--bias-gold);
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 3;
            display: none;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-5px);}
            60% {transform: translateY(-3px);}
        }

        .portrait-container {
            width: 100%;
            height: 85%;
            background: #eee;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            background-size: cover;
            background-position: center;
        }

        .img-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: var(--bts-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 1;
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .portrait-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease, opacity 0.4s ease;
            position: relative;
            z-index: 2;
        }

        .photo-card:hover .portrait-container img {

        }

        .member-name {
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .group-tag {
            font-size: 0.75rem;
            margin-top: 5px;
            opacity: 0.6;
            font-weight: 600;
        }

        .btn {
            padding: 14px 45px;
            border: none;
            border-radius: 50px;
            background: white;
            color: var(--text-dark);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .btn:hover { background: var(--text-dark); color: white; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #next-btn { display: none; margin-top: 20px; }

        .consensus {

            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0,0,0,0.05);

        #effect-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        @media (max-width: 600px) {
            .cards-container { gap: 10px; flex-direction: column; align-items: center; }

        }
    </style>

            { text: "Who is most likely to lose their passport in a foreign country?", btsWeight: "RM", svtWeight: "Mingyu", consensus: [85, 15] },
            { text: "Who is most likely to nag you about cleaning your room like a parent?", btsWeight: "Jin", svtWeight: "Jeonghan", consensus: [45, 55] },
            { text: "Who is most likely to break something expensive and then look guilty?", btsWeight: "RM", svtWeight: "Mingyu", consensus: [70, 30] },
            { text: "Who is most likely to start a random dance battle in a supermarket?", btsWeight: "J-Hope", svtWeight: "Hoshi", consensus: [50, 50] },
            { text: "Who is most likely to spend the whole day gaming and completely ignore their phone?", btsWeight: "Suga", svtWeight: "Wonwoo", consensus: [40, 60] },
            { text: "Who is most likely to accidentally post a major spoiler on social media?", btsWeight: "RM", svtWeight: "Hoshi", consensus: [45, 55] },
            { text: "Who is most likely to cook a 5-star meal for the other members?", btsWeight: "Jin", svtWeight: "Mingyu", consensus: [35, 65] },
            { text: "Who is most likely to get scared by a bug during a photoshoot?", btsWeight: "J-Hope", svtWeight: "Seungkwan", consensus: [60, 40] },
            { text: "Who is most likely to fall asleep during a serious award show meeting?", btsWeight: "Suga", svtWeight: "Jeonghan", consensus: [60, 40] },
            { text: "Who is most likely to win a high-stakes poker game by cheating/lying?", btsWeight: "Jin", svtWeight: "Jeonghan", consensus: [15, 85] },
            { text: "Who is most likely to try to communicate with a tiger at the zoo?", btsWeight: "V", svtWeight: "Hoshi", consensus: [20, 80] },
            { text: "Who is most likely to have 100 identical white t-shirts in their closet?", btsWeight: "Jungkook", svtWeight: "Wonwoo", consensus: [90, 10] },
            { text: "Who is most likely to ask 'Do you know BTS/SVT?' to a random stranger?", btsWeight: "Jin", svtWeight: "Seungkwan", consensus: [80, 20] },
            { text: "Who is most likely to accidentally join the wrong group's dance practice?", btsWeight: "V", svtWeight: "DK", consensus: [40, 60] },
            { text: "Who is most likely to spend their entire paycheck on high-end art?", btsWeight: "RM", svtWeight: "The8", consensus: [65, 35] },
            { text: "Who is most likely to stay in the studio for 48 hours without eating?", btsWeight: "Suga", svtWeight: "Woozi", consensus: [50, 50] },
            { text: "Who is most likely to be found working out at 3 AM?", btsWeight: "Jungkook", svtWeight: "S.Coups", consensus: [75, 25] },
            { text: "Who is most likely to give a 10-minute speech about their love for wine?", btsWeight: "Jin", svtWeight: "Joshua", consensus: [60, 40] },
            { text: "Who is most likely to accidentally leave the group chat?", btsWeight: "RM", svtWeight: "Vernon", consensus: [55, 45] },
            { text: "Who is most likely to become a professional variety show host after retirement?", btsWeight: "Jin", svtWeight: "Seungkwan", consensus: [30, 70] },
            { text: "Who is most likely to forget their own birthday?", btsWeight: "V", svtWeight: "Vernon", consensus: [40, 60] },
            { text: "Who is most likely to take 1000 selfies just to post one?", btsWeight: "Jimin", svtWeight: "The8", consensus: [70, 30] },
            { text: "Who is most likely to win a game of rock-paper-scissors 10 times in a row?", btsWeight: "Jungkook", svtWeight: "Jeonghan", consensus: [40, 60] },
            { text: "Who is most likely to bring a full skincare routine to a camping trip?", btsWeight: "Jimin", svtWeight: "Mingyu", consensus: [45, 55] },
            { text: "Who is most likely to be the designated driver for a group outing?", btsWeight: "Jin", svtWeight: "S.Coups", consensus: [50, 50] }
        ];

        let selectedBtsBias = null, selectedSvtBias = null;
        let currentQuestionIdx = 0, currentDuo = [], canSelect = true, activeScenarios = [];
        let stats = { biasPicks: 0, agreementSum: 0, loyalty: 0 };

        const canvas = document.getElementById('effect-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Primary Source: Bing Image Search Thumbnails
        const getRealImage = (name, group) => `https://tse2.mm.bing.net/th?q=${encodeURIComponent(name + ' ' + group + ' kpop face')}&w=800&h=800&c=7&rs=1&p=0`;
        // Fallback Source: UI Avatars
        const getAvatar = (name) => `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=BFAFF2&color=fff&size=400&font-size=0.33`;

        function renderMemberPortrait(name, group) {
            const imgSrc = getRealImage(name, group);
            const fallbackStr = getAvatar(name);
            
            return `
                <div class="img-loader"></div>
                <img src="${imgSrc}" 
                     alt="${name}" 
                     style="opacity: 0;"
                     onload="this.previousElementSibling.style.display='none'; this.style.opacity=1;"
                     onerror="this.onerror=null; this.src='${fallbackStr}'; this.previousElementSibling.style.display='none'; this.style.opacity=1;">
            `;
        }

        function initBiasGrids() {
            const grids = [
                {id: 'bts-bias-grid', list: btsMembers, set: (n) => selectedBtsBias = n},
                {id: 'svt-bias-grid', list: svtMembers, set: (n) => selectedSvtBias = n}
            ];
            grids.forEach(g => {
                const container = document.getElementById(g.id);
                g.list.forEach(name => {
                    const el = document.createElement('div');
                    el.className = 'bias-item';
                    el.textContent = name;
                    el.onclick = () => {
                        container.querySelectorAll('.bias-item').forEach(i => i.classList.remove('selected'));
                        el.classList.add('selected');
                        g.set(name);
                        document.getElementById('start-game-btn').disabled = !(selectedBtsBias && selectedSvtBias);
                    };
                    container.appendChild(el);
                });
            });
        }

        document.getElementById('start-game-btn').onclick = () => {
            activeScenarios = [...allScenarios].sort(() => 0.5 - Math.random()).slice(0, 10);
            showScreen('game-screen');
            loadQuestion();
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loadQuestion() {
            canSelect = true;
            document.getElementById('next-btn').style.display = 'none';
            const cards = ['card-left', 'card-right'];
            cards.forEach(c => {
                const el = document.getElementById(c);
                el.classList.remove('selected', 'dimmed', 'holographic');
                el.querySelector('.bias-badge').style.display = 'none';
                el.querySelector('.consensus').classList.remove('visible');
            });

            const q = activeScenarios[currentQuestionIdx];
            document.getElementById('question-box').textContent = q.text;
            document.getElementById('question-count').textContent = `ROUND ${currentQuestionIdx + 1} / 10`;
            document.getElementById('progress-bar').style.width = `${(currentQuestionIdx / 10) * 100}%`;

            const btsMem = btsMembers[Math.floor(Math.random() * btsMembers.length)];
            const svtMem = svtMembers[Math.floor(Math.random() * svtMembers.length)];
            const btsOnLeft = Math.random() > 0.5;
            currentDuo = btsOnLeft ? [btsMem, svtMem] : [svtMem, btsMem];
            const groups = btsOnLeft ? ["BTS", "SVT"] : ["SVT", "BTS"];

            ['left', 'right'].forEach((side, i) => {
                const name = currentDuo[i];
                const group = groups[i];
                document.getElementById(`name-${side}`).textContent = name;
                document.getElementById(`group-${side}`).textContent = group;
                document.getElementById(`portrait-${side}`).innerHTML = renderMemberPortrait(name, group);
                
                if (name === selectedBtsBias || name === selectedSvtBias) {
                    document.getElementById(`badge-${side}`).style.display = 'block';
                    document.getElementById(`card-${side}`).classList.add('holographic');
                }
            });

            let lp = 50;
            if (currentDuo[0] === q.btsWeight || currentDuo[0] === q.svtWeight) {
                lp = q.consensus[0];
            } else if (currentDuo[1] === q.btsWeight || currentDuo[1] === q.svtWeight) {
                lp = q.consensus[1];
            } else {
                lp = Math.floor(Math.random() * 60) + 20; 
            }
            
            document.getElementById('consensus-left').textContent = `FANS SAY: ${lp}%`;
            document.getElementById('consensus-right').textContent = `FANS SAY: ${100 - lp}%`;
            document.getElementById('consensus-left').dataset.val = lp;
            document.getElementById('consensus-right').dataset.val = 100 - lp;
        }

        function selectMember(idx) {
            if (!canSelect) return;
            canSelect = false;
            const name = currentDuo[idx];
            const cards = [document.getElementById('card-left'), document.getElementById('card-right')];
            cards[idx].classList.add('selected');
            cards[1-idx].classList.add('dimmed');

            const val = parseInt(document.getElementById(idx === 0 ? 'consensus-left' : 'consensus-right').dataset.val);
            stats.agreementSum += val;

            if (name === selectedBtsBias || name === selectedSvtBias) {
                stats.loyalty += 50; // Use of Bias: Loyalty Points
                triggerHearts(cards[idx]);
            }
            
            document.getElementById('consensus-left').classList.add('visible');
            document.getElementById('consensus-right').classList.add('visible');
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function loadNextQuestion() {
            if (++currentQuestionIdx < 10) loadQuestion();
            else showResults();
        }

        function showResults() {
            showScreen('result-screen');
            document.getElementById('loyalty-stat').textContent = stats.loyalty;
            const avg = Math.round(stats.agreementSum / 10);
            document.getElementById('agreement-stat').textContent = `${avg}%`;

            // NEW: FANDOM TIER SYSTEM
            let tier = "";
            let summary = "";

            if (avg >= 75) {
                tier = "🏆 S-TIER: Fandom Historian";
                summary = "You know exactly how the fandom thinks! Your knowledge of the lore, inside jokes, and member personalities is absolute perfection.";
            } else if (avg >= 55) {
                tier = "🥇 A-TIER: Veteran Fan";
                summary = "You definitely know your stuff! You might have a few unique opinions, but you generally align perfectly with the fandom's consensus.";
            } else if (avg >= 35) {
                tier = "🥈 B-TIER: Casual Stannie";
                summary = "You have a super unique perspective! You see hidden traits in these members that the rest of the fandom totally misses.";
            } else {
                tier = "🤡 ROGUE-TIER: Complete Chaos";
                summary = "You are playing by your own rules! You must be writing your own alternate universe fanfics because your takes are wildly original.";
            }

            if (stats.loyalty >= 150) {
                summary += `<br><br><i>Plus, your absolute loyalty to ${selectedBtsBias} and ${selectedSvtBias} is legendary.</i>`;
            }

            document.getElementById('summary-text').innerHTML = `<span style="display:block; font-size: 1.3rem; margin-bottom: 10px; color: var(--bts-purple);">${tier}</span>${summary}`;
        }

        class Heart {
            constructor(x, y) {
                this.x = x; this.y = y; this.size = Math.random() * 12 + 6;
                this.speedX = (Math.random() - 0.5) * 10; this.speedY = -Math.random() * 8 - 4;
                this.opacity = 1; this.rotation = Math.random() * Math.PI * 2;
                this.color = Math.random() > 0.5 ? '#BFAFF2' : '#F7CAC9';
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.moveTo(0,0);
                ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, this.size/3, 0, this.size);
                ctx.bezierCurveTo(this.size, this.size/3, this.size/2, -this.size/2, 0, 0);
                ctx.fill(); ctx.restore();
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.speedY += 0.15; this.opacity -= 0.015; }
        }

        function triggerHearts(el) {
            const rect = el.getBoundingClientRect(), containerRect = canvas.getBoundingClientRect();
            const cx = rect.left + rect.width / 2 - containerRect.left, cy = rect.top + rect.height / 2 - containerRect.top;
            for (let i = 0; i < 40; i++) particles.push(new Heart(cx, cy));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.opacity > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.onload = () => { initBiasGrids(); animate(); };
    </script>
</body>
